name: PR Full Python Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  full-python-tests:
    name: full-python-suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONHASHSEED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run full Python test suite
        run: ./scripts/run_full_python_tests.sh
