name: PR Blocking E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: cli-api-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run PR-blocking E2E suite
        run: ./scripts/run_pr_blocking_e2e.sh

