<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #132238; }
    .sub { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4f627d; }
    .h { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #16314e; }
    .t { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #2b4969; }
    .s { font: 600 11px 'Segoe UI', Arial, sans-serif; fill: #38557a; }
  </style>

  <rect width="1400" height="820" fill="#f3f8fc"/>
  <text x="36" y="48" class="title">AgentFlow UI Demo: Stage Board + Task Detail</text>
  <text x="36" y="74" class="sub">Single view for flow control, task state, PR context, and run/audit trace</text>

  <rect x="30" y="100" width="820" height="690" rx="14" fill="#ffffff" stroke="#cfdcec"/>
  <text x="50" y="130" class="h">Stage Board</text>

  <g transform="translate(44,146)">
    <rect width="124" height="628" rx="10" fill="#e8f0ff" stroke="#bfd4ff"/>
    <text x="10" y="22" class="h">collected</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#d7e4f5"/>
    <text x="14" y="54" class="t">#101 parser</text><text x="14" y="70" class="t">fallback bug</text><text x="14" y="90" class="s">pending</text>
  </g>

  <g transform="translate(176,146)">
    <rect width="124" height="628" rx="10" fill="#efe9ff" stroke="#d8c8ff"/>
    <text x="10" y="22" class="h">triaged</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#e3dbfb"/>
    <text x="14" y="54" class="t">#111 scope</text><text x="14" y="70" class="t">refinement</text><text x="14" y="90" class="s">approved</text>
  </g>

  <g transform="translate(308,146)">
    <rect width="124" height="628" rx="10" fill="#e4f7f4" stroke="#b5ece4"/>
    <text x="10" y="22" class="h">executing</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#cdeee8"/>
    <text x="14" y="54" class="t">#120 add</text><text x="14" y="70" class="t">capability route</text><text x="14" y="90" class="s">in_progress</text>
  </g>

  <g transform="translate(440,146)">
    <rect width="124" height="628" rx="10" fill="#fff4e6" stroke="#ffdcb1"/>
    <text x="10" y="22" class="h">review</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#f3e2c5"/>
    <text x="14" y="54" class="t">#132 docs +</text><text x="14" y="70" class="t">i18n cleanup</text><text x="14" y="90" class="s">pr_ready</text>
    <rect x="8" y="124" width="108" height="102" rx="8" fill="#fff" stroke="#f3e2c5"/>
    <text x="14" y="144" class="t">#146 task detail</text><text x="14" y="160" class="t">pr panel enrich</text><text x="14" y="176" class="s">pr_open</text>
    <text x="14" y="196" class="sub">selected</text>
  </g>

  <g transform="translate(572,146)">
    <rect width="124" height="628" rx="10" fill="#e7f8ea" stroke="#bdeec7"/>
    <text x="10" y="22" class="h">done</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#d8efdd"/>
    <text x="14" y="54" class="t">#98 webhook</text><text x="14" y="70" class="t">dedupe done</text><text x="14" y="90" class="s">merged</text>
  </g>

  <g transform="translate(704,146)">
    <rect width="124" height="628" rx="10" fill="#ffe8e8" stroke="#ffc2c2"/>
    <text x="10" y="22" class="h">blocked</text>
    <rect x="8" y="34" width="108" height="78" rx="8" fill="#fff" stroke="#f5d5d5"/>
    <text x="14" y="54" class="t">#140 gate</text><text x="14" y="70" class="t">flaky timeout</text><text x="14" y="90" class="s">blocked</text>
  </g>

  <rect x="880" y="100" width="490" height="690" rx="14" fill="#ffffff" stroke="#cfdcec"/>
  <text x="900" y="130" class="h">Task Detail (#146)</text>
  <text x="900" y="152" class="sub">stage: review  |  status: pr_open  |  source: github #146</text>

  <rect x="900" y="172" width="450" height="74" rx="10" fill="#fff4e6" stroke="#ffdcb1"/>
  <text x="916" y="196" class="h">PR Detail</text>
  <text x="916" y="214" class="t">summary: add PR links extraction + stage-first task panel simplification</text>
  <text x="916" y="232" class="t">repo: github.com/Tweakzx/agentflow  |  issue: #146  |  PR: #58</text>

  <rect x="900" y="258" width="450" height="96" rx="10" fill="#f8fbff" stroke="#dbe8f6"/>
  <text x="916" y="282" class="h">Flow Controls</text>
  <text x="916" y="300" class="t">run task  |  move status  |  note + force override</text>
  <text x="916" y="318" class="t">safeguard: illegal transitions blocked</text>
  <text x="916" y="336" class="t">gate required before review/done (unless force=true)</text>

  <rect x="900" y="366" width="450" height="168" rx="10" fill="#f9fcff" stroke="#dbe8f6"/>
  <text x="916" y="390" class="h">Recent Runs</text>
  <text x="916" y="410" class="t">run #81 passed  | adapter: mock | gate=pass</text>
  <text x="916" y="428" class="t">steps: claim:passed | edit:passed | gate:passed</text>
  <text x="916" y="452" class="t">run #80 failed  | adapter: mock | gate=fail</text>
  <text x="916" y="470" class="t">steps: claim:passed | edit:failed | gate:failed</text>

  <rect x="900" y="546" width="450" height="224" rx="10" fill="#f9fcff" stroke="#dbe8f6"/>
  <text x="916" y="570" class="h">Audit Trail</text>
  <text x="916" y="592" class="t">2026-03-31 16:42  approved → in_progress  [claimed by openclaw-agent]</text>
  <text x="916" y="612" class="t">2026-03-31 16:48  in_progress → pr_ready  [run passed]</text>
  <text x="916" y="632" class="t">2026-03-31 16:55  pr_ready → pr_open  [manual-web] open PR created</text>
  <text x="916" y="652" class="t">2026-03-31 17:06  pr_open → blocked  [manual-web] flaky e2e check</text>
  <text x="916" y="672" class="t">2026-03-31 17:18  blocked → pr_open  [manual-web] force retry</text>

  <path d="M564 268 C670 268, 760 240, 872 220" stroke="#6d87a8" stroke-width="3" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6d87a8"/>
    </marker>
  </defs>
</svg>
