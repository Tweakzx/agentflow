    <rect x="10" y="36" width="186" height="72" rx="8" fill="#fff" stroke="#d7e4f5"/>
    <text x="18" y="56" class="t">#101 parser fallback bug</text><text x="18" y="74" class="s">status: pending</text>
    <rect x="10" y="116" width="186" height="72" rx="8" fill="#fff" stroke="#d7e4f5"/>
    <text x="18" y="136" class="t">#104 webhook dedupe</text><text x="18" y="154" class="s">status: pending</text>
  </g>

  <g transform="translate(260,142)">
