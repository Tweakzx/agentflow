<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #132238; }
    .sub { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #50627c; }
    .h { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #18324f; }
    .t { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #2d4a6b; }
  </style>
  <rect width="1200" height="760" fill="#f4f8fc"/>
  <text x="40" y="50" class="title">AgentFlow Stage Board (Demo)</text>
  <text x="40" y="76" class="sub">Task-first workflow view with drag-and-drop transitions and readable color coding</text>

  <g transform="translate(40,110)">
    <rect width="180" height="600" rx="12" fill="#e8f0ff" stroke="#bfd4ff"/>
    <text x="14" y="30" class="h">collected</text>
    <rect x="12" y="46" width="156" height="78" rx="8" fill="#fff" stroke="#d7e4f5"/>
    <text x="20" y="70" class="t">#101 Parse error in</text><text x="20" y="88" class="t">router fallback</text><text x="20" y="106" class="sub">status: pending</text>
    <rect x="12" y="136" width="156" height="78" rx="8" fill="#fff" stroke="#d7e4f5"/>
    <text x="20" y="160" class="t">#104 Add webhook</text><text x="20" y="178" class="t">dedupe check</text><text x="20" y="196" class="sub">status: pending</text>
  </g>

  <g transform="translate(230,110)">
    <rect width="180" height="600" rx="12" fill="#efe9ff" stroke="#d8c8ff"/>
    <text x="14" y="30" class="h">triaged</text>
    <rect x="12" y="46" width="156" height="78" rx="8" fill="#fff" stroke="#e3dbfb"/>
    <text x="20" y="70" class="t">#96 Stage naming</text><text x="20" y="88" class="t">cleanup</text><text x="20" y="106" class="sub">status: approved</text>
  </g>

  <g transform="translate(420,110)">
    <rect width="180" height="600" rx="12" fill="#e4f7f4" stroke="#b5ece4"/>
    <text x="14" y="30" class="h">executing</text>
    <rect x="12" y="46" width="156" height="78" rx="8" fill="#fff" stroke="#cdeee8"/>
    <text x="20" y="70" class="t">#88 Add capability</text><text x="20" y="88" class="t">route docs</text><text x="20" y="106" class="sub">status: in_progress</text>
  </g>

  <g transform="translate(610,110)">
    <rect width="180" height="600" rx="12" fill="#fff4e6" stroke="#ffdcb1"/>
    <text x="14" y="30" class="h">review</text>
    <rect x="12" y="46" width="156" height="78" rx="8" fill="#fff" stroke="#f3e2c5"/>
    <text x="20" y="70" class="t">#73 Console layout</text><text x="20" y="88" class="t">refinement</text><text x="20" y="106" class="sub">status: pr_ready</text>
  </g>

  <g transform="translate(800,110)">
    <rect width="180" height="600" rx="12" fill="#e7f8ea" stroke="#bdeec7"/>
    <text x="14" y="30" class="h">done</text>
    <rect x="12" y="46" width="156" height="78" rx="8" fill="#fff" stroke="#d8efdd"/>
    <text x="20" y="70" class="t">#52 Trigger service</text><text x="20" y="88" class="t">idempotency</text><text x="20" y="106" class="sub">status: merged</text>
  </g>

  <g transform="translate(990,110)">
    <rect width="170" height="600" rx="12" fill="#ffe8e8" stroke="#ffc2c2"/>
    <text x="14" y="30" class="h">blocked</text>
    <rect x="12" y="46" width="146" height="78" rx="8" fill="#fff" stroke="#f5d5d5"/>
    <text x="20" y="70" class="t">#91 flaky gate</text><text x="20" y="88" class="t">cmd timeout</text><text x="20" y="106" class="sub">status: blocked</text>
  </g>

  <path d="M200 255 C230 255, 230 255, 250 255" stroke="#6d87a8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M390 255 C420 255, 420 255, 440 255" stroke="#6d87a8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M580 255 C610 255, 610 255, 630 255" stroke="#6d87a8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M770 255 C800 255, 800 255, 820 255" stroke="#6d87a8" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6d87a8"/>
    </marker>
  </defs>
</svg>
