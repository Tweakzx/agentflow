<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%A6%8A%3C/text%3E%3C/svg%3E" />
  <title>AgentFlow Console</title>
    <link rel="stylesheet" href="/static/console.css?v={{ASSET_VERSION}}" />
</head>
<body>
  <div class="topbar">
    <div>
      <div class="brand">🦊 AgentFlow Console</div>
      <div class="sub">Task list + recent run stream</div>
    </div>
    <div class="toolbar">
      <label class="sub">Project</label>
      <select id="projectSelect"></select>
      <span class="badge" id="connState">Stream: OFF</span>
      <button class="secondary" onclick="refreshAll()">Refresh</button>
      <button class="secondary" id="autoBtn" onclick="toggleAuto()">Auto: OFF</button>
    </div>
  </div>

  <div class="layout">
    <section class="panel">
      <h3>Task List</h3>
      <div class="filters">
        <input id="q" placeholder="search title..." oninput="renderTaskList()" />
        <select id="sourceFilter" onchange="renderTaskList()">
          <option value="">all sources</option>
        </select>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>

    <section class="panel detail">
      <h3>Task Detail</h3>
      <div id="detail" class="detail-content"><div class="detail-empty">Select a task to inspect execution details.</div></div>
    </section>
  </div>

  <section class="split">
    <section class="panel">
      <h3>Recent Runs</h3>
      <div id="recentRuns" class="list"></div>
    </section>
    <section class="panel">
      <h3>Audit Trail</h3>
      <div id="auditList" class="list"></div>
    </section>
  </section>

    <script src="/static/console.js?v={{ASSET_VERSION}}"></script>
</body>
</html>
